<!DOCTYPE html>
<html ng-app="empApp">
<head>
    <title>Employee Dashboard</title>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial;
            background: #f4f6f9;
        }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            height: 100vh;
            background: #2c3e50;
            color: white;
            position: fixed;
            padding: 20px;
        }

        .sidebar h2 {
            font-size: 18px;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: #ddd;
            padding: 10px 0;
            text-decoration: none;
            font-size: 14px;
        }

        .sidebar a:hover {
            color: white;
        }

        /* MAIN */
        .main {
            margin-left: 240px;
        }

        .header {
            background: white;
            padding: 15px 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 20px;
            color: #333;
        }

        .content {
            padding: 25px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.06);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        button {
            padding: 8px 18px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #2980b9;
        }

        .status {
            text-align: center;
            margin-top: 15px;
            color: #777;
        }

        .error {
            color: red;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f1f3f6;
            color: #333;
            padding: 12px;
            text-align: left;
            font-size: 14px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f9fbfd;
        }

        .badge {
            background: #e3f2fd;
            color: #3498db;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
        }
    </style>
</head>

<body ng-controller="empCtrl">

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Company Panel</h2>
    <a href="#">Dashboard</a>
    <a href="#">Employees</a>
    <a href="#">Reports</a>
</div>

<!-- MAIN -->
<div class="main">

    <!-- HEADER -->
    <div class="header">
        <h1>Employee Dashboard</h1>
        <button ng-click="loadData()">Load Data</button>
    </div>

    <!-- CONTENT -->
    <div class="content">
        <div class="card">

            <div class="top-bar">
                <h3>Employee Records</h3>
            </div>

            <!-- STATES -->
            <div class="status" ng-if="loading">Loading data...</div>
            <div class="status error" ng-if="error">Failed to load data</div>

            <!-- TABLE -->
            <table ng-if="employees.length > 0">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Role</th>
                    <th>Salary</th>
                </tr>

                <tr ng-repeat="emp in employees">
                    <td>{{emp.id}}</td>
                    <td>{{emp.name}}</td>
                    <td><span class="badge">{{emp.role}}</span></td>
                    <td>₹ {{emp.salary}}</td>
                </tr>
            </table>

            <div class="status" ng-if="!loading && employees.length === 0 && !error">
                Click "Load Data" to view employees
            </div>

        </div>
    </div>
</div>

<script>
    var app = angular.module("empApp", []);

    app.controller("empCtrl", function($scope, $http) {

        $scope.employees = [];
        $scope.loading = false;
        $scope.error = false;

        $scope.loadData = function() {
            $scope.loading = true;
            $scope.error = false;

            $http.get("employees.json")
                .then(function(response) {
                    $scope.employees = response.data;
                })
                .catch(function() {
                    $scope.error = true;
                })
                .finally(function() {
                    $scope.loading = false;
                });
        };

    });
</script>

</body>
</html>
