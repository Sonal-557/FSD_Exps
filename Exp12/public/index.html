<!DOCTYPE html>
<html ng-app="studentApp">
<head>
    <title>Student Management</title>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="app.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial;
            background: #f4f6f9;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 15px 25px;
            font-size: 18px;
        }

        .container {
            width: 950px;
            margin: 30px auto;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        h2 {
            margin-top: 0;
            color: #333;
            margin-bottom: 15px;
        }

        /* FORM */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #444;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #3498db;
            outline: none;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            background: #3498db;
            color: white;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background: #2980b9;
        }

        /* TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #ecf0f1;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f9fbfd;
        }

        .delete {
            background: #e74c3c;
            padding: 6px 10px;
            border-radius: 4px;
        }

        .delete:hover {
            background: #c0392b;
        }

        .empty {
            text-align: center;
            color: #888;
            margin-top: 15px;
        }
    </style>
</head>

<body ng-controller="studentCtrl">

<div class="header">
    Student Management System
</div>

<div class="container">

    <div class="grid">

        <!-- LEFT: FORM -->
        <div class="card">
            <h2>Add Student</h2>

            <div class="form-group">
                <label>Name</label>
                <input ng-model="student.name" placeholder="Enter name">
            </div>

            <div class="form-group">
                <label>Age</label>
                <input type="number" ng-model="student.age" placeholder="Enter age">
            </div>

            <div class="form-group">
                <label>Course</label>
                <input ng-model="student.course" placeholder="Enter course">
            </div>

            <button ng-click="addStudent()">Add Student</button>
        </div>

        <!-- RIGHT: TABLE -->
        <div class="card">
            <h2>Student Records</h2>

            <table ng-if="students.length > 0">
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Course</th>
                    <th>Action</th>
                </tr>

                <tr ng-repeat="s in students">
                    <td>{{s.name}}</td>
                    <td>{{s.age}}</td>
                    <td>{{s.course}}</td>
                    <td>
                        <button class="delete" ng-click="deleteStudent($index)">
                            Delete
                        </button>
                    </td>
                </tr>
            </table>

            <div class="empty" ng-if="students.length === 0">
                No students added yet
            </div>
        </div>

    </div>

</div>

</body>
</html>
